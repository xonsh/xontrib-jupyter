name: Testing

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev dependencies
        run: |
          python -m pip install -U pip
          pip install -e '.[dev]'

      - name: Run tests
        # tests/test_interrupt.py is auto-skipped on Windows (POSIX-only:
        # relies on SIGINT semantics + psutil.Process.children to verify
        # subprocess reaping); the rest of the suite runs everywhere.
        run: pytest -v --timeout=120
